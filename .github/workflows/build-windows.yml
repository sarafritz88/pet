name: Build Windows Installer

on:
  # Run automatically when you push a version tag (e.g. v0.1.0)
  push:
    tags:
      - 'v*'
  # Also allow triggering manually from the Actions tab for testing
  workflow_dispatch:

permissions:
  contents: write  # required to create GitHub Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Rebuild uiohook-napi (and any other native addons) against Electron's
      # ABI before Forge packages the app. Forge's own rebuild step will then
      # find them already built and skip recompiling.
      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -f -w uiohook-napi
        env:
          ELECTRON_VERSION: '40.6.0'

      - name: Build Windows installer
        run: npm run make

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: out/make/squirrel.windows/x64/
          if-no-files-found: error

      # Only create a GitHub Release when triggered by a version tag
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Desktop Pet ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: out/make/squirrel.windows/x64/*Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
